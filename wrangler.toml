name = "peekmd"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain: peekmd.dev
# Workers Route configured via Cloudflare API (zone bd0001bd...):
#   pattern = "peekmd.dev/*" → script = "peekmd"
# The API token lacks Workers Scripts:Edit permission, so wrangler deploy
# cannot manage routes directly. Route was created via zone-level API.
# To redeploy the worker code, update the API token permissions first.
# routes = [
#   { pattern = "peekmd.dev/*", zone_name = "peekmd.dev" },
# ]

[[kv_namespaces]]
binding = "PAGES"
id = "fcaf0070253b484d8b5349957ba5b9cf"
preview_id = "dc1bb955f5e84ddea2925ad197ddab96"

[vars]
BASE_URL = "https://peekmd.dev"

# ─── Test / Staging Environment ────────────────────────────────
# Deploy:  npx wrangler deploy --env test
# Secrets: npx wrangler secret put STRIPE_SECRET_KEY --env test
#          npx wrangler secret put STRIPE_BASIC_PRICE_ID --env test
#          npx wrangler secret put STRIPE_PRO_PRICE_ID --env test
#          npx wrangler secret put STRIPE_WEBHOOK_SECRET --env test
[env.test]
name = "peekmd-test"
routes = [
  { pattern = "test.peekmd.dev/*", zone_name = "peekmd.dev" },
]

[env.test.vars]
BASE_URL = "https://test.peekmd.dev"

[[env.test.kv_namespaces]]
binding = "PAGES"
id = "dc1bb955f5e84ddea2925ad197ddab96"

name = "peekmd"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain: peekmd.dev
# Route configuration requires zone-level API token permissions.
# Either update the CLOUDFLARE_API_TOKEN to include zone:peekmd.dev permissions,
# or set up the Worker Route manually in the Cloudflare dashboard:
#   Workers Routes > Add Route > peekmd.dev/* → peekmd worker
# routes = [
#   { pattern = "peekmd.dev/*", zone_name = "peekmd.dev" },
# ]

[[kv_namespaces]]
binding = "PAGES"
id = "fcaf0070253b484d8b5349957ba5b9cf"
preview_id = "dc1bb955f5e84ddea2925ad197ddab96"

[vars]
BASE_URL = "https://peekmd.dev"
